function moverDerrumbe(){

    let y = -100;

    const intervalo = setInterval(() => {

        if(!derrumbe){

            clearInterval(intervalo);
            return;

        }

        y += velocidadTruck;

        derrumbe.style.top = y + "px";

        verificarDerrumbe();

        if(y > window.innerHeight){

            derrumbe.remove();

            derrumbe = null;

            clearInterval(intervalo);

            setTimeout(() => {

            if(!enTunel){

            crearDerrumbe();

            }

            },20000);
        }

    },20);

}
function verificarDerrumbe(){

    if(!derrumbe) return;

    const motoRect =
    player.getBoundingClientRect();

    const derrumbeRect =
    derrumbe.getBoundingClientRect();

    if(

        motoRect.left < derrumbeRect.right &&
        motoRect.right > derrumbeRect.left &&
        motoRect.top < derrumbeRect.bottom &&
        motoRect.bottom > derrumbeRect.top

    ){

        alert("Te estrellaste contra un derrumbe");
        gameover("Te estrellaste contra un derrumbe");

    }

}

if(truck){

function moverGhostTruck(){

    let y = window.innerHeight;

    ghostBajando = false;

    const intervalo = setInterval(() => {

        if(!ghostTruck){

            clearInterval(intervalo);
            return;

        }

        if(!ghostBajando){

            y -= velocidadTruck + 5;

        }else{

            y += velocidadTruck + 8;

        }

        ghostTruck.style.top =
        y + "px";

        verificarGhostTruck();

        if(y < -250 && !ghostBajando){

            ghostBajando = true;

            const carrilAleatorio =
            Math.floor(Math.random() * 3);

            ghostTruck.style.left =
            (posiciones[carrilAleatorio] - 20)
            + "px";

        }

        if(
            y > window.innerHeight &&
            ghostBajando
        ){

            ataquesGhost++;

            vidaBossFill.style.width =
            (100 - (ataquesGhost * 16.6))
            + "%";

            if(ataquesGhost >= 6){

                ghostDerrotado = true;

                peleaGhost = false;

                vidaBoss.style.display = "none";

                sonidoTruck.pause();
                sonidoTruck.currentTime = 0;

                sonidoMotor.pause();
                sonidoMotor.currentTime = 0;

                ghostTruck.remove();

                ghostTruck = null;

                clearInterval(intervalo);

                salidaTunelEpica();

                return;
            }

            y = window.innerHeight;

            ghostBajando = false;

        }

    },20);

}
function verificarGhostTruck(){

    if(!ghostTruck) return;

    if(!ghostBajando) return;

    const motoRect =
    player.getBoundingClientRect();

    const ghostRect =
    ghostTruck.getBoundingClientRect();

    if(

        motoRect.left < ghostRect.right &&
        motoRect.right > ghostRect.left &&
        motoRect.top < ghostRect.bottom &&
        motoRect.bottom > ghostRect.top

    ){

        alert(
        "EL GHOST TRUCK TE ALCANZÓ"
        );

        

    }

}

function abrirTienda(){

            motoActual = "crypton";
            player.style.backgroundImage =
            'url("crypton110.png")';

            alert("Crypton equipada");

            return;
        }

        if(monedas >= 500){

            monedas -= 500;

            localStorage.setItem(
            "cryptonComprada",
            "si"
            );

            cryptonComprada = true;

            sonidoMotor.pause();

            'url("mt09.png")';

);
